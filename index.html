<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小贾私房菜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <img id="logo" src="img/icon/logo.png" alt="logo" height="50">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜索菜品、价格或描述...">
        </div>
        <button id="admin-toggle" class="admin-button">
            <img src="img/icon/manage.png" alt="管理员" width="30" height="30">
        </button>
    </header>

    <!-- 标签筛选栏 -->
    <div class="tags-container">
        <div class="tags-wrapper" id="tags-wrapper">
            <!-- 标签将通过JS动态生成 -->
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 菜品卡片将通过JS动态生成 -->
        <div class="menu-grid" id="menu-grid">
        </div>
    </main>

    <!-- 购物车 -->
    <div class="cart-container" id="cart-container">
        <div class="cart-header">
            <h3>购物车</h3>
            <button id="cart-toggle" class="cart-toggle">
                <img src="img/icon/购物车.png" alt="收起" width="24" height="24">
            </button>
        </div>
        <div class="cart-content" id="cart-content">
            <div class="cart-items" id="cart-items">
                <!-- 购物车项目将通过JS动态生成 -->
            </div>
            <div class="cart-summary" id="cart-summary">
                <div class="total">
                    <span>合计:</span>
                    <span id="total-price">¥0.00</span>
                </div>
                <button class="checkout-button">结算</button>
            </div>
        </div>
    </div>

    <!-- 菜品详情模态框 -->
    <div class="modal" id="dish-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <img src="img/icon/关闭.png" alt="关闭" width="24" height="24">
            </button>
            <div class="dish-detail" id="dish-detail">
                <!-- 菜品详情将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 管理员模式 -->
    <div class="admin-panel" id="admin-panel">
        <div class="admin-header">
            <h2>编辑模式</h2>
            <button id="admin-close" class="admin-close">
                <img src="img/icon/关闭.png" alt="关闭" width="24" height="24">
            </button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h4>编辑菜品</h4>
                <form id="dish-form">
                    <input type="text" placeholder="菜品名称" id="dish-name">
                    <input type="number" placeholder="价格" id="dish-price">
                    <input type="text" placeholder="图片URL" id="dish-image">
                    <textarea placeholder="菜品简介" id="dish-desc"></textarea>
                    <textarea placeholder="详细描述" id="dish-detail-desc"></textarea>
                    <textarea placeholder="制作方法" id="dish-method"></textarea>
                    <textarea placeholder="用料" id="dish-ingredients"></textarea>
                    <input type="text" placeholder="标签 (用逗号分隔)" id="dish-tags">
                    <button type="submit">保存菜品</button>
                </form>
            </div>
            <div class="admin-section">
                <h4>管理标签</h4>
                <div class="tags-list" id="tags-list">
                    <!-- 标签列表将通过JS动态生成 -->
                </div>
                <form id="tag-form">
                    <input type="text" placeholder="添加新标签" id="tag-name">
                    <button type="submit">添加标签</button>
                </form>
            </div>
            <div class="admin-section">
                <h4>数据同步</h4>
                <button id="save-to-github" class="github-save-btn">同步数据</button>
                <p id="save-status" class="save-status"></p>
            </div>
        </div>
    </div>
    
    <!-- 编辑模式 -->
    <div class="edit-panel" id="edit-panel">
        <div class="edit-header">
            <h2>编辑菜品</h2>
            <button id="edit-close" class="edit-close">
                <img src="img/icon/关闭.png" alt="关闭" width="24" height="24">
            </button>
        </div>
        <div class="edit-content">
            <form id="edit-dish-form">
                <input type="text" placeholder="菜品名称" id="edit-dish-name">
                <input type="number" placeholder="价格" id="edit-dish-price">
                <input type="text" placeholder="图片URL" id="edit-dish-image">
                <textarea placeholder="菜品简介" id="edit-dish-desc"></textarea>
                <textarea placeholder="详细描述" id="edit-dish-detail-desc"></textarea>
                <textarea placeholder="制作方法" id="edit-dish-method"></textarea>
                <textarea placeholder="用料" id="edit-dish-ingredients"></textarea>
                <input type="text" placeholder="标签 (用逗号分隔)" id="edit-dish-tags">
                <button type="submit">保存修改</button>
            </form>
        </div>
    </div>

    <script src="script-api-simple.js"></script>
</body>
</html>
