<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小贾私房菜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-left">
            <img id="logo" src="img/icon/logo.png" alt="logo" height="50">
        </div>
        <div class="header-center">
            <h1 class="logo-text">小贾私房菜</h1>
        </div>
        <div class="header-right">
            <button id="search-toggle" class="search-button">
                <img src="img/icon/search.png" alt="搜索" width="24" height="24">
            </button>
            <button id="admin-toggle" class="admin-button">
                <img src="img/icon/manage.png" alt="管理员" width="24" height="24">
            </button>
        </div>
    </header>

    <!-- 搜索弹窗 -->
    <div class="search-modal" id="search-modal">
        <div class="search-modal-content">
            <input type="text" id="search-input" placeholder="搜索菜品、价格或描述..." autofocus>
            <button id="search-close" class="search-close">
                <img src="img/icon/关闭.png" alt="关闭" width="20" height="20">
            </button>
        </div>
    </div>

    <!-- 标签筛选栏 -->
    <div class="tags-container">
        <div class="primary-tags-container" id="primary-tags-container">
            <!-- 一级标签将通过JS动态生成 -->
        </div>
        <div class="tags-divider"></div>
        <div class="secondary-tags-container" id="secondary-tags-container">
            <!-- 二级标签将通过JS动态生成 -->
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 菜品卡片将通过JS动态生成 -->
        <div class="menu-grid" id="menu-grid">
        </div>
    </main>

    <!-- 购物车按钮 -->
    <button class="cart-button" id="cart-button">
        <img src="img/icon/购物车.png" alt="购物车" width="28" height="28">
        <span class="cart-badge" id="cart-badge">0</span>
    </button>

    <!-- 购物车弹窗 -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-sidebar-header">
            <h3>购物车</h3>
            <button class="cart-close" id="cart-close">
                <img src="img/icon/关闭.png" alt="关闭" width="20" height="20">
            </button>
        </div>
        <div class="cart-sidebar-content">
            <div class="cart-items" id="cart-items">
                <!-- 购物车项目将通过JS动态生成 -->
            </div>
        </div>
        <div class="cart-sidebar-footer">
            <div class="cart-summary">
                <div class="summary-row total-row">
                    <span>总计</span>
                    <span id="total-amount">¥0.00</span>
                </div>
            </div>
            <button class="checkout-button" id="checkout-button">去结算</button>
        </div>
    </div>

    <!-- 菜品详情模态框 -->
    <div class="modal" id="dish-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <img src="img/icon/关闭.png" alt="关闭" width="24" height="24">
            </button>
            <div class="dish-detail" id="dish-detail">
                <!-- 菜品详情将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 管理员模式 -->
    <div class="admin-panel" id="admin-panel">
        <div class="admin-header">
            <h2>编辑模式</h2>
            <button id="admin-close" class="admin-close">
                <img src="img/icon/关闭.png" alt="关闭" width="24" height="24">
            </button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h4>管理标签</h4>
                <div class="tags-list" id="tags-list">
                    <!-- 标签列表将通过JS动态生成 -->
                </div>
                <form id="tag-form">
                    <input type="text" placeholder="添加新标签" id="tag-name">
                    <button type="submit">添加标签</button>
                </form>
            </div>
            <div class="admin-section">
                <h4>数据同步</h4>
                <button id="save-to-github" class="github-save-btn">同步数据</button>
                <p id="save-status" class="save-status"></p>
            </div>
        </div>
    </div>

    <script src="script-api-simple.js"></script>
</body>
</html>
