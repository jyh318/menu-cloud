<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小贾私房菜</title>
<!-- 引入中文字体：Noto Serif SC（衬线体，用于标题）和 Noto Sans SC（无衬线体，用于正文） -->
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- 引入主样式文件 -->
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== 桌面端顶部导航栏 ========== -->
  <header>
    <!-- 左侧：Logo 和品牌名称 -->
    <div class="header-left">
      <div class="logo-mark">
        <!-- 品牌Logo图片：使用 img/icon/logo.png -->
        <img src="img/icon/logo.png" alt="Logo">
      </div>
      <span class="brand-name">小贾私房菜</span>
    </div>

    <!-- 中间：页面标题 -->
    <div class="header-center">
      <span class="header-title">精选菜单</span>
    </div>

    <!-- 右侧：功能按钮区 -->
    <div class="header-right">
      <!-- 搜索按钮：点击打开搜索弹窗 -->
      <button class="icon-btn" id="search-btn" aria-label="搜索">
        <!-- 搜索图标：使用SVG内联，无需额外图片资源 -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <!-- 订单按钮：点击跳转到订单管理页面 -->
      <button class="icon-btn" id="orders-btn" aria-label="订单">
        <!-- 订单图标：使用SVG内联，无需额外图片资源 -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
      <!-- 用户头像按钮 -->
      <button class="icon-btn logged-out" id="admin-btn" aria-label="个人信息">
        <img src="img/icon/头像.png" alt="用户头像" id="admin-avatar-img" class="avatar-img">
        <span id="admin-avatar-text" class="avatar-text">用</span>
      </button>
    </div>
  </header>

  <!-- ========== 移动端顶部导航栏 ========== -->
  <div class="mobile-header">
    <!-- 左侧：Logo 和品牌名称（移动端） -->
    <div class="mobile-header-left">
      <div class="mobile-logo">
        <!-- 品牌Logo图片：使用 img/icon/logo.png -->
        <img src="img/icon/logo.png" alt="Logo">
      </div>
      <span class="mobile-brand">小贾私房菜</span>
    </div>
    <!-- 右侧：功能按钮（移动端） -->
    <div class="mobile-header-right">
      <!-- 搜索按钮（移动端） -->
      <button class="icon-btn" id="mobile-search-btn" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <!-- 订单按钮（移动端） -->
      <button class="icon-btn" id="mobile-orders-btn" aria-label="订单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
      <!-- 用户头像按钮（移动端） -->
      <button class="icon-btn logged-out" id="mobile-avatar-btn" aria-label="个人信息">
        <img src="img/icon/头像.png" alt="用户头像" id="mobile-avatar-img" class="avatar-img">
        <span id="mobile-avatar-text" class="avatar-text">用</span>
      </button>
    </div>
  </div>

  <!-- ========== 主布局区域 ========== -->
  <div class="main-layout">

    <!-- ========== 左侧分类栏 / 侧边栏 ========== -->
    <aside class="sidebar">
      <!-- 侧边栏标题 -->
      <div class="sidebar-label">菜单分类</div>

      <!-- 分类列表将通过JavaScript动态生成，数据来自后端 /api/tags 接口 -->
      <div id="category-list">
        <!-- 动态生成的分类项（包括"全部菜品"和一级分类） -->
      </div>

      <!-- 侧边栏装饰元素（纯视觉效果） -->
      <div class="sidebar-decor"></div>

      <!-- 侧边栏底部推广区域 -->
      <div class="sidebar-promo">
        <div class="sidebar-promo-title">今日特供</div>
        <div class="sidebar-promo-text">新鲜食材 · 匠心手作<br>每日限量供应</div>
      </div>
    </aside>

    <!-- ========== 移动端子分类面板 ========== -->
    <div class="mobile-sub-panel" id="mobileSubPanel"></div>

    <!-- ========== 主内容区 ========== -->
    <main class="content">
      <!-- 内容头部：标题和元信息 -->
      <div class="content-header">
        <h1 class="content-title">
          本日精选
          <span>新鲜食材，匠心呈现 — 主厨今日推荐</span>
        </h1>
        <div class="content-meta">
          <div class="meta-tag" id="dish-count-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            当前：<span id="dish-count">0</span> 道菜
          </div>
        </div>
      </div>

      <!-- 菜品卡片网格：数据通过JavaScript从后端 /api/dishes 接口动态加载 -->
      <div class="food-grid" id="food-grid">
        <!-- 加载中提示 -->
        <div class="loading" id="loading">加载中...</div>
      </div>
    </main>
  </div>

  <!-- ========== 搜索弹窗 ========== -->
  <div class="search-modal" id="search-modal">
    <div class="search-modal-content">
      <!-- 搜索输入框 -->
      <input type="text" id="search-input" placeholder="搜索菜品、价格或描述..." autofocus>
      <!-- 搜索关闭按钮：使用 img/icon/close.png -->
      <button id="search-close" class="search-close">
        <img src="img/icon/close.png" alt="关闭" width="20" height="20">
      </button>
    </div>
  </div>

  <!-- ========== 菜品详情模态框 ========== -->
  <div class="modal" id="dish-modal">
    <div class="modal-content">
      <!-- 详情关闭按钮：使用 img/icon/close.png -->
      <button class="modal-close" id="modal-close">
        <img src="img/icon/close.png" alt="关闭" width="24" height="24">
      </button>
      <!-- 菜品详情内容：通过JavaScript动态填充 -->
      <div class="dish-detail" id="dish-detail">
      </div>
    </div>
  </div>

  <!-- ========== 浮动购物车按钮 ========== -->
  <div class="floating-cart" id="floating-cart">
    <!-- 购物车图标：使用SVG内联，无需额外图片资源 -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    购物车
    <!-- 购物车商品数量徽章 -->
    <span class="cart-count" id="cart-count">0</span>
  </div>

  <!-- ========== 购物车侧边栏 ========== -->
  <div class="cart-sidebar" id="cart-sidebar">
    <!-- 购物车头部 -->
    <div class="cart-sidebar-header">
      <h3>购物车</h3>
      <!-- 购物车关闭按钮：使用 img/icon/close.png -->
      <button class="cart-close" id="cart-close">
        <img src="img/icon/close.png" alt="关闭" width="20" height="20">
      </button>
    </div>
    <!-- 购物车内容区 -->
    <div class="cart-sidebar-content">
      <div class="cart-items" id="cart-items">
        <!-- 购物车为空时的提示 -->
        <div class="cart-empty" id="cart-empty">
          购物车是空的
        </div>
      </div>
    </div>
    <!-- 购物车底部：结算区域 -->
    <div class="cart-sidebar-footer">
      <div class="cart-summary">
        <div class="summary-row total-row">
          <span>总计</span>
          <span id="total-amount">¥0.00</span>
        </div>
      </div>
      <!-- 备注输入 -->
      <div class="cart-note">
        <label for="cart-note-input">备注</label>
        <input type="text" id="cart-note-input" placeholder="输入备注信息...">
      </div>
      <!-- 结算按钮 -->
      <button class="checkout-button" id="checkout-button">去结算</button>
    </div>
  </div>

  <!-- ========== 用户个人信息面板 ========== -->
  <div class="user-panel" id="user-panel">
    <div class="user-panel-header">
      <h3>个人信息</h3>
      <!-- 用户面板关闭按钮：使用 img/icon/close.png -->
      <button class="user-panel-close" id="user-panel-close">
        <img src="img/icon/close.png" alt="关闭" width="20" height="20">
      </button>
    </div>
    <div class="user-panel-content">
      <div class="user-avatar-large" id="user-avatar-large">用</div>
      <div class="user-info">
        <div class="user-name" id="user-name">-</div>
        <div class="user-id" id="user-id">用户ID: -</div>
      </div>
      <div class="user-balance-card">
        <div class="balance-label">账户余额</div>
        <div class="balance-amount" id="user-balance">¥0.00</div>
      </div>
      <div class="user-panel-actions">
        <button class="user-action-btn" id="user-logout-btn">退出登录</button>
      </div>
    </div>
  </div>

  <!-- ========== 管理员面板 ========== -->
  <div class="admin-panel" id="admin-panel">
    <div class="admin-header">
      <h3>管理员模式</h3>
      <!-- 管理员面板关闭按钮：使用 img/icon/close.png -->
      <button class="admin-close" id="admin-close">
        <img src="img/icon/close.png" alt="关闭" width="20" height="20">
      </button>
    </div>
    <div class="admin-content">
      <p>管理员功能已启用</p>
      <p class="admin-hint">点击菜品卡片可以编辑或删除</p>
      <div class="admin-actions">
        <button class="add-dish-btn" id="add-dish-btn">+ 新增菜品</button>
        <button class="edit-dish-btn" id="edit-dish-btn">✎ 编辑菜品</button>
      </div>
      <button class="user-action-btn admin-logout-btn" id="admin-logout-btn">退出登录</button>
    </div>
  </div>

  <!-- ========== 编辑菜品弹窗 ========== -->
  <div class="modal" id="edit-dish-modal">
    <div class="modal-content edit-dish-content">
      <!-- 编辑关闭按钮：使用 img/icon/close.png -->
      <button class="modal-close" id="edit-dish-close">
        <img src="img/icon/close.png" alt="关闭" width="24" height="24">
      </button>
      <h2 class="edit-dish-title" id="edit-dish-title">编辑菜品</h2>
      <form class="edit-dish-form" id="edit-dish-form">
        <div class="form-row">
          <div class="form-group">
            <label for="edit-dish-name">菜品名称</label>
            <input type="text" id="edit-dish-name" required>
          </div>
          <div class="form-group">
            <label for="edit-dish-price">价格</label>
            <input type="number" id="edit-dish-price" step="0.01" required>
          </div>
        </div>
        <div class="form-group">
          <label for="edit-dish-image">图片URL</label>
          <input type="text" id="edit-dish-image">
        </div>
        <div class="form-group">
          <label for="edit-dish-description">简介</label>
          <textarea id="edit-dish-description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-dish-detail">详细描述</label>
          <textarea id="edit-dish-detail" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-dish-ingredients">用料</label>
          <textarea id="edit-dish-ingredients" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-dish-method">制作方法</label>
          <textarea id="edit-dish-method" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-dish-tags">标签（逗号分隔）</label>
          <input type="text" id="edit-dish-tags">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="edit-dish-cancel">取消</button>
          <button type="submit" class="btn-save" id="edit-dish-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== 新增菜品弹窗 ========== -->
  <div class="modal" id="add-dish-modal">
    <div class="modal-content edit-dish-content">
      <!-- 新增关闭按钮：使用 img/icon/close.png -->
      <button class="modal-close" id="add-dish-close">
        <img src="img/icon/close.png" alt="关闭" width="24" height="24">
      </button>
      <h2 class="edit-dish-title" id="add-dish-title">新增菜品</h2>
      <form class="edit-dish-form" id="add-dish-form">
        <div class="form-row">
          <div class="form-group">
            <label for="add-dish-name">菜品名称</label>
            <input type="text" id="add-dish-name" required>
          </div>
          <div class="form-group">
            <label for="add-dish-price">价格</label>
            <input type="number" id="add-dish-price" step="0.01" required>
          </div>
        </div>
        <div class="form-group">
          <label for="add-dish-image">图片URL</label>
          <input type="text" id="add-dish-image" placeholder="不填则使用默认图片">
        </div>
        <div class="form-group">
          <label for="add-dish-description">简介</label>
          <textarea id="add-dish-description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="add-dish-detail">详细描述</label>
          <textarea id="add-dish-detail" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="add-dish-ingredients">用料</label>
          <textarea id="add-dish-ingredients" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="add-dish-method">制作方法</label>
          <textarea id="add-dish-method" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="add-dish-tags">标签（逗号分隔）</label>
          <input type="text" id="add-dish-tags">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="add-dish-cancel">取消</button>
          <button type="submit" class="btn-save" id="add-dish-submit">新增</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== 登录弹窗 ========== -->
  <div class="modal" id="login-modal">
    <div class="modal-content login-content">
      <!-- 登录关闭按钮：使用 img/icon/close.png -->
      <button class="modal-close" id="login-close">
        <img src="img/icon/close.png" alt="关闭" width="24" height="24">
      </button>
      <h2 class="login-title">用户登录</h2>
      <p class="login-subtitle">请登录后再进行下单操作</p>
      <div class="login-form">
        <div class="form-group">
          <label for="login-username">用户名</label>
          <input type="text" id="login-username" placeholder="请输入用户名" autofocus>
        </div>
        <div class="form-group">
          <label for="login-password">密码</label>
          <input type="password" id="login-password" placeholder="请输入密码">
        </div>
        <button class="login-button" id="login-button">登 录</button>
        <p class="login-error" id="login-error"></p>
      </div>
    </div>
  </div>

  <!-- ========== 确认弹窗 ========== -->
  <div class="modal" id="confirm-modal">
    <div class="modal-content confirm-content">
      <div class="confirm-icon">⚠️</div>
      <h3 class="confirm-title" id="confirm-title">确认操作</h3>
      <p class="confirm-message" id="confirm-message">确定要执行此操作吗？</p>
      <div class="confirm-actions">
        <button class="btn-cancel" id="confirm-cancel">取消</button>
        <button class="btn-danger" id="confirm-ok">确认</button>
      </div>
    </div>
  </div>

  <!-- 引入主脚本文件：包含菜品加载、购物车、搜索等所有交互逻辑 -->
  <script src="script.js"></script>
</body>
</html>
