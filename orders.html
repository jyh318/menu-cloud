<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小贾私房菜 - 我的订单</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f3efe9;
            --bg-card: #ffffff;
            --surface: #ece7df;
            --text-primary: #2c2418;
            --text-secondary: #5c5045;
            --text-muted: #8a7e72;
            --accent: #c45d3e;
            --accent-light: #d4714f;
            --accent-glow: rgba(196, 93, 62, 0.2);
            --gold: #b8923e;
            --border: rgba(180, 170, 155, 0.25);
            --shadow-card: 0 2px 12px rgba(80,60,40,0.06), 0 1px 3px rgba(80,60,40,0.04);
            --shadow-hover: 0 8px 30px rgba(80,60,40,0.1), 0 2px 8px rgba(196,93,62,0.08);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --font-display: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
            --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 30%, rgba(184,146,62,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 70%, rgba(196,93,62,0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(250, 248, 245, 0.92);
            backdrop-filter: blur(24px) saturate(1.5);
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c45d3e, #d4714f);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(196, 93, 62, 0.25);
        }

        .header-logo img {
            width: 24px;
            height: 24px;
            opacity: 0.95;
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.04em;
        }

        .header-back {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-body);
        }

        .header-back:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }

        .page-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .order-list {
            display: grid;
            gap: 20px;
        }

        .order-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .order-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: rgba(196, 93, 62, 0.2);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .order-number {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }

        .order-date {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .order-total {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        .order-total::before {
            content: '¥';
            font-size: 0.9rem;
            font-weight: 400;
            margin-right: 2px;
        }

        .order-items {
            display: grid;
            gap: 12px;
            margin-bottom: 16px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
        }

        .order-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .order-item-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .order-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .order-item-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .order-item-price {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .order-item-price::before {
            content: '¥';
            font-size: 0.7rem;
            font-weight: 400;
        }

        .order-item-quantity {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px dashed var(--border);
        }

        .order-note {
            font-size: 0.82rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .order-note-icon {
            color: var(--gold);
            font-size: 0.75rem;
        }

        .order-action {
            font-size: 0.82rem;
            color: var(--accent);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.3s ease;
        }

        .order-action:hover {
            color: var(--accent-light);
        }

        .order-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 36, 24, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10vh;
            backdrop-filter: blur(8px);
        }

        .order-detail-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 60px rgba(80, 60, 40, 0.2);
            border: 1px solid var(--border);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .modal-header h2 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--border-strong);
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-info {
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .modal-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85rem;
        }

        .modal-info-row:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        .modal-info-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .modal-info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-family: var(--font-display);
        }

        .modal-items {
            margin-bottom: 24px;
        }

        .modal-items h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
        }

        .modal-note {
            margin-bottom: 20px;
            padding: 14px 16px;
            background: rgba(184, 146, 62, 0.06);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--gold);
        }

        .modal-note-label {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .modal-note-value {
            font-size: 0.85rem;
            color: var(--text-secondary);
            word-break: break-all;
            line-height: 1.5;
        }

        .modal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
        }

        .modal-item:last-child {
            margin-bottom: 0;
        }

        .modal-item-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal-item-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .modal-item-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .modal-item-price {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
        }

        .modal-item-price::before {
            content: '¥';
            font-size: 0.7rem;
            font-weight: 400;
        }

        .modal-item-subtotal {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .modal-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(196, 93, 62, 0.06), rgba(196, 93, 62, 0.02));
            border-radius: var(--radius-md);
            margin-top: 8px;
        }

        .modal-total-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .modal-total-value {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }

        .modal-total-value::before {
            content: '¥';
            font-size: 1rem;
            font-weight: 400;
            margin-right: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.6;
        }

        .empty-state-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .empty-state-btn {
            display: inline-block;
            padding: 12px 32px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: var(--font-body);
        }

        .empty-state-btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--surface);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header {
                height: 64px;
                padding: 0 16px;
            }

            .header-title {
                font-size: 1.05rem;
            }

            .header-back {
                padding: 8px 14px;
                font-size: 0.78rem;
            }

            .container {
                padding: 16px 12px;
            }

            .page-title {
                font-size: 1.3rem;
            }

            .order-card {
                padding: 16px;
            }

            .order-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .order-total {
                align-self: flex-end;
            }

            .order-item {
                padding: 10px 12px;
            }

            .order-item-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .modal-content {
                width: 95%;
                max-height: 90vh;
                margin-top: 5vh;
            }

            .modal-body {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-logo">
                <img src="img/icon/logo.png" alt="Logo">
            </div>
            <span class="header-title">小贾私房菜</span>
        </div>
        <a href="index.html" class="header-back">
            <span>←</span> 返回首页
        </a>
    </div>

    <div class="container">
        <h1 class="page-title">我的订单</h1>
        <p class="page-subtitle">查看您的点餐记录</p>

        <div class="order-list" id="order-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <div class="order-detail-modal" id="order-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>订单详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        let orders = [];

        function formatDate(dateStr) {
            if (!dateStr) return '';
            
            const monthMap = {'Jan': '01', 'Feb': '02', 'Mar': '03', 'Apr': '04', 'May': '05', 'Jun': '06',
                             'Jul': '07', 'Aug': '08', 'Sep': '09', 'Oct': '10', 'Nov': '11', 'Dec': '12'};
            
            const match = dateStr.match(/^\w{3},\s*(\d{1,2})\s+(\w{3})\s+(\d{4})\s+(\d{2}):(\d{2}):(\d{2})\s+GMT$/);
            if (match) {
                const year = match[3];
                const month = monthMap[match[2]] || match[2];
                const day = String(match[1]).padStart(2, '0');
                const hours = match[4];
                const minutes = match[5];
                const seconds = match[6];
                return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            }
            
            return dateStr;
        }

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_BASE_URL}/orders`, {
                    credentials: 'include'
                });
                const data = await response.json();
                orders = data.orders || [];
                renderOrders();
            } catch (error) {
                console.error('获取订单失败:', error);
                document.getElementById('order-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div class="empty-state-title">获取订单失败</div>
                        <div class="empty-state-desc">请稍后重试</div>
                    </div>
                `;
            }
        }

        function renderOrders() {
            const orderList = document.getElementById('order-list');

            if (orders.length === 0) {
                orderList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-title">暂无订单记录</div>
                        <div class="empty-state-desc">快去点餐吧，美味在等您</div>
                        <a href="index.html" class="empty-state-btn">去点餐</a>
                    </div>
                `;
                return;
            }

            orderList.innerHTML = orders.map(order => `
                <div class="order-card" onclick="showOrderDetail('${order.odnum}')">
                    <div class="order-header">
                        <div class="order-info">
                            <div class="order-number">${order.odnum}</div>
                            <div class="order-date">下单时间: ${formatDate(order.oddate)}</div>
                        </div>
                        <div class="order-total">${order.heji}</div>
                    </div>
                    
                    <div class="order-items">
                        <div class="order-item">
                            <div class="order-item-left">
                                <div class="order-item-name">点击查看完整订单详情</div>
                                <div class="order-item-meta">包含菜品信息、备注等</div>
                            </div>
                            <div class="order-item-right">
                                <div class="order-action">查看详情 →</div>
                            </div>
                        </div>
                    </div>

                    <div class="order-footer">
                        ${order.remark ? `
                            <div class="order-note">
                                <span class="order-note-icon">📝</span>
                                <span>备注: ${order.remark}</span>
                            </div>
                        ` : ''}
                        <div class="order-action">查看详情 →</div>
                    </div>
                </div>
            `).join('');
        }

        async function showOrderDetail(orderNumber) {
            try {
                const response = await fetch(`${API_BASE_URL}/order/${orderNumber}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                const order = data.order;
                const items = data.items;

                const noteHtml = order.remark ? `
                    <div class="modal-note">
                        <div class="modal-note-label">备注</div>
                        <div class="modal-note-value">${order.remark}</div>
                    </div>
                ` : '';

                document.getElementById('modal-body').innerHTML = `
                    <div class="modal-info">
                        <div class="modal-info-row">
                            <span class="modal-info-label">订单编号</span>
                            <span class="modal-info-value">${order.odnum}</span>
                        </div>
                        <div class="modal-info-row">
                            <span class="modal-info-label">下单时间</span>
                            <span class="modal-info-value">${formatDate(order.oddate)}</span>
                        </div>
                        ${order.creatuserid ? `
                            <div class="modal-info-row">
                                <span class="modal-info-label">下单用户</span>
                                <span class="modal-info-value">用户ID: ${order.creatuserid}</span>
                            </div>
                        ` : ''}
                    </div>

                    ${noteHtml}

                    <div class="modal-items">
                        <h3>菜品明细</h3>
                        ${items.map(item => `
                            <div class="modal-item">
                                <div class="modal-item-left">
                                    <div class="modal-item-name">${item.dish_name || `菜品ID: ${item.disid}`}</div>
                                    <div class="modal-item-meta">单价 ¥${item.danjia} × ${item.coun}</div>
                                </div>
                                <div class="modal-item-right">
                                    <div class="modal-item-price">${item.danjia * item.coun}</div>
                                    <div class="modal-item-subtotal">小计</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="modal-total">
                        <span class="modal-total-label">合计金额</span>
                        <span class="modal-total-value">${order.heji}</span>
                    </div>
                `;

                document.getElementById('order-modal').classList.add('active');
            } catch (error) {
                console.error('获取订单详情失败:', error);
                alert('获取订单详情失败');
            }
        }

        function closeModal() {
            document.getElementById('order-modal').classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', fetchOrders);

        document.getElementById('order-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
