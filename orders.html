<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <style>
        :root {
            --bg-primary: #1A1A1E;
            --bg-secondary: #24242A;
            --bg-tertiary: #2A2A32;
            --bg-elevated: #2F2F38;
            --brand-primary: #FF8A3D;
            --brand-hover: #FF9F5A;
            --text-primary: #F0F0F0;
            --text-secondary: #A0A0A5;
            --text-tertiary: #6E6E73;
            --border-color: #33333B;
            --border-light: #2A2A32;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
            --shadow-modal: 0 20px 60px rgba(0, 0, 0, 0.6);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid var(--border-light);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            background-color: var(--bg-tertiary);
            border-radius: var(--radius-full);
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }

        .header a:hover {
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--brand-primary);
        }

        .container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .order-list {
            display: grid;
            gap: 16px;
        }

        .order-card {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid var(--border-light);
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            border-color: var(--border-color);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-number {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .order-date {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .order-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-primary);
        }

        .order-items {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }

        .order-item-name {
            color: var(--text-secondary);
        }

        .order-item-info {
            color: var(--text-tertiary);
        }

        .order-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .order-detail-modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-modal);
            border: 1px solid var(--border-light);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .modal-close:hover {
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--brand-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-info {
            margin-bottom: 16px;
            padding: 12px;
            background-color: var(--bg-tertiary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .modal-info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }

        .modal-info-label {
            color: var(--text-tertiary);
        }

        .modal-info-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .modal-items {
            margin-top: 16px;
        }

        .modal-items h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .modal-note {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            padding: 12px;
            background-color: var(--bg-tertiary);
            border-radius: var(--radius-md);
            font-size: 14px;
            border: 1px solid var(--border-color);
        }

        .modal-note-label {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .modal-note-value {
            flex: 1;
            color: var(--text-primary);
            word-break: break-all;
        }

        .modal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .modal-item:last-child {
            border-bottom: none;
        }

        .modal-item-name {
            font-size: 14px;
            color: var(--text-primary);
        }

        .modal-item-price {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .modal-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-top: 16px;
            border-top: 2px solid var(--brand-primary);
            font-size: 18px;
        }

        .modal-total-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-total-value {
            font-weight: 700;
            color: var(--brand-primary);
            font-size: 1.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-state img {
            width: 120px;
            height: 120px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
        }

        @media (max-width: 480px) {
            .header {
                padding: 12px 16px;
            }

            .header h1 {
                font-size: 16px;
            }

            .header a {
                padding: 6px 12px;
                font-size: 0.8rem;
            }

            .container {
                margin: 16px auto;
                padding: 0 12px;
            }

            .order-card {
                padding: 16px;
            }

            .order-total {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>订单管理</h1>
        <a href="index.html">返回首页</a>
    </div>

    <div class="container">
        <div class="order-list" id="order-list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div class="order-detail-modal" id="order-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>订单详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        let orders = [];

        function formatDate(dateStr) {
            if (!dateStr) return '';
            
            const monthMap = {'Jan': '01', 'Feb': '02', 'Mar': '03', 'Apr': '04', 'May': '05', 'Jun': '06',
                             'Jul': '07', 'Aug': '08', 'Sep': '09', 'Oct': '10', 'Nov': '11', 'Dec': '12'};
            
            const match = dateStr.match(/^\w{3},\s*(\d{1,2})\s+(\w{3})\s+(\d{4})\s+(\d{2}):(\d{2}):(\d{2})\s+GMT$/);
            if (match) {
                const year = match[3];
                const month = monthMap[match[2]] || match[2];
                const day = String(match[1]).padStart(2, '0');
                const hours = match[4];
                const minutes = match[5];
                const seconds = match[6];
                return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            }
            
            return dateStr;
        }

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_BASE_URL}/orders`, {
                    credentials: 'include'
                });
                const data = await response.json();
                orders = data.orders || [];
                renderOrders();
            } catch (error) {
                console.error('获取订单失败:', error);
                document.getElementById('order-list').innerHTML = '<div class="empty-state"><p>获取订单失败，请稍后重试</p></div>';
            }
        }

        function renderOrders() {
            const orderList = document.getElementById('order-list');

            if (orders.length === 0) {
                orderList.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
                        <p>暂无订单记录</p>
                    </div>
                `;
                return;
            }

            orderList.innerHTML = orders.map(order => `
                <div class="order-card" onclick="showOrderDetail('${order.odnum}')">
                    <div class="order-header">
                        <div>
                            <div class="order-number">订单编号: ${order.odnum}</div>
                            <div class="order-date">下单时间: ${formatDate(order.oddate)}</div>
                        </div>
                        <div class="order-total">¥${order.heji}</div>
                    </div>
                    <div class="order-items">
                        <div class="order-item">
                            <span class="order-item-name">点击查看订单详情</span>
                            <span class="order-item-info">→</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function showOrderDetail(orderNumber) {
            try {
                const response = await fetch(`${API_BASE_URL}/order/${orderNumber}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                const order = data.order;
                const items = data.items;

                document.getElementById('modal-body').innerHTML = `
                    <div class="modal-info">
                        <div class="modal-info-row">
                            <span class="modal-info-label">订单编号</span>
                            <span class="modal-info-value">${order.odnum}</span>
                        </div>
                        <div class="modal-info-row">
                            <span class="modal-info-label">下单时间</span>
                            <span class="modal-info-value">${formatDate(order.oddate)}</span>
                        </div>
                    </div>

                    <div class="modal-items">
                        <h3>菜品明细</h3>
                        ${items.map(item => `
                            <div class="modal-item">
                                <div>
                                    <div class="modal-item-name">${item.dish_name || `菜品ID: ${item.disid}`}</div>
                                    <div style="font-size: 12px; color: #999;">单价: ¥${item.danjia} x ${item.coun}</div>
                                </div>
                                <div class="modal-item-price">¥${item.danjia * item.coun}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="modal-note" id="modal-note" style="display: none;">
                        <span class="modal-note-label">备注</span>
                        <span class="modal-note-value" id="modal-note-value"></span>
                    </div>

                    <div class="modal-total">
                        <span class="modal-total-label">合计金额</span>
                        <span class="modal-total-value">¥${order.heji}</span>
                    </div>
                `;

                const modalNote = document.getElementById('modal-note');
                const modalNoteValue = document.getElementById('modal-note-value');
                const note = order.remark || '';
                if (note) {
                    modalNoteValue.textContent = note;
                    modalNote.style.display = 'flex';
                } else {
                    modalNote.style.display = 'none';
                }

                document.getElementById('order-modal').classList.add('active');
            } catch (error) {
                console.error('获取订单详情失败:', error);
                alert('获取订单详情失败');
            }
        }

        function closeModal() {
            document.getElementById('order-modal').classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', fetchOrders);

        document.getElementById('order-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
