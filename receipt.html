<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小贾私房菜 - 消费小票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimHei', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }

        .receipt-container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .receipt-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .receipt-header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .receipt-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .receipt-body {
            padding: 20px;
        }

        .receipt-info {
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
        }

        .info-row .label {
            color: #666;
        }

        .info-row .value {
            font-weight: 500;
        }

        .dashed-line {
            border-bottom: 1px dashed #ddd;
            margin: 15px 0;
        }

        .full-line {
            border-bottom: 2px solid #333;
            margin: 15px 0;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .table-body {
            margin-top: 10px;
        }

        .table-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            line-height: 2;
            padding: 5px 0;
        }

        .table-row .name {
            flex: 2;
            text-align: left;
        }

        .table-row .price {
            flex: 1;
            text-align: right;
            font-size: 12px;
            color: #666;
        }

        .table-row .quantity {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .table-row .subtotal {
            flex: 1;
            text-align: right;
            font-weight: 500;
        }

        .total-section {
            margin-top: 20px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            padding: 8px 0;
        }

        .total-row .label {
            color: #666;
        }

        .total-row .amount {
            font-size: 20px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .receipt-footer {
            background-color: #f8f8f8;
            padding: 15px 20px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .receipt-footer p {
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }

        .footer-thanks {
            font-size: 14px !important;
            color: #666 !important;
            margin-bottom: 8px;
        }

        .print-btn {
            display: block;
            width: 100%;
            max-width: 200px;
            margin: 20px auto 0;
            padding: 12px 24px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .print-btn:hover {
            background-color: #ee5a5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(238, 90, 90, 0.3);
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .receipt-container {
                box-shadow: none;
                max-width: 100%;
                width: 100%;
            }
            
            .print-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="receipt-container" id="receipt-container">
        <div class="receipt-header">
            <h1>小贾私房菜</h1>
            <p>爱仙仙的每一天</p>
        </div>
        
        <div class="receipt-body">
            <div class="receipt-info">
                <div class="info-row">
                    <span class="label">点餐时间:</span>
                    <span class="value" id="order-date">-</span>
                </div>
                <div class="info-row">
                    <span class="label">单号:</span>
                    <span class="value" id="order-no">-</span>
                </div>
                <div class="info-row">
                    <span class="label">服务员:</span>
                    <span class="value" id="waiter">-</span>
                </div>
            </div>

            <div class="dashed-line"></div>

            <div class="table-header">
                <span class="name">菜品</span>
                <span class="quantity">数量</span>
                <span class="price">单价</span>
                <span class="subtotal">小计</span>
            </div>

            <div class="table-body" id="order-items">
            </div>

            <div class="full-line"></div>

            <div class="total-section">
                <div class="total-row">
                    <span class="label">合计金额:</span>
                    <span class="amount" id="total-amount">¥0.00</span>
                </div>
            </div>
        </div>

        <div class="receipt-footer">
            <p class="footer-thanks">喂饱仙仙宝贝，期待下次再来哦</p>
            <p>小贾私房菜 | 用心烹饪每一道菜</p>
<!--        <p>客服热线: 饿了只需要叫声爸爸，我就来了</p>-->        
        </div>
    </div>

    <button class="print-btn" onclick="window.print()">打印小票</button>

    <script>
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function generateOrderNo() {
            const date = new Date();
            const timestamp = date.getTime().toString().slice(-8);
            const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            return `XJ${timestamp}${random}`;
        }

        function renderReceipt(orderData) {
            const orderItems = document.getElementById('order-items');
            orderItems.innerHTML = '';

            if (!orderData || !orderData['订单详情']) {
                orderItems.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">暂无订单数据</p>';
                return;
            }

            document.getElementById('order-date').textContent = formatDate(new Date());
            document.getElementById('order-no').textContent = generateOrderNo();
            document.getElementById('waiter').textContent = '仙仙的饲养员';
            document.getElementById('total-amount').textContent = `¥${orderData['合计金额']}`;

            orderData['订单详情'].forEach(item => {
                const row = document.createElement('div');
                row.className = 'table-row';
                row.innerHTML = `
                    <span class="name">${item['菜品名称']}</span>
                    <span class="quantity">${item['菜品数量']}</span>
                    <span class="price">¥${item['菜品单价']}</span>
                    <span class="subtotal">¥${item['小计金额']}</span>
                `;
                orderItems.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderJson = urlParams.get('order');
            
            if (orderJson) {
                try {
                    const orderData = JSON.parse(decodeURIComponent(orderJson));
                    renderReceipt(orderData);
                } catch (e) {
                    console.error('解析订单数据失败:', e);
                    renderReceipt(null);
                }
            } else {
                renderReceipt(null);
            }
        });

        window.renderReceipt = renderReceipt;
    </script>
</body>
</html>
