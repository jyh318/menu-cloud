<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小贾私房菜 - 消费小票</title>
    <style>
        :root {
            --bg-primary: #1A1A1E;
            --bg-secondary: #24242A;
            --bg-tertiary: #2A2A32;
            --brand-primary: #FF8A3D;
            --brand-hover: #FF9F5A;
            --text-primary: #F0F0F0;
            --text-secondary: #A0A0A5;
            --text-tertiary: #6E6E73;
            --border-color: #33333B;
            --border-light: #2A2A32;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-primary);
            padding: 24px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .receipt-container {
            max-width: 400px;
            margin: 0 auto;
            background-color: var(--bg-secondary);
            box-shadow: var(--shadow-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .receipt-header {
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FFB088 100%);
            color: #1A1A1E;
            padding: 24px;
            text-align: center;
        }

        .receipt-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .receipt-header p {
            font-size: 13px;
            opacity: 0.85;
        }

        .receipt-body {
            padding: 20px;
        }

        .receipt-info {
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            line-height: 1.9;
            color: var(--text-primary);
        }

        .info-row .label {
            color: var(--text-tertiary);
        }

        .info-row .value {
            font-weight: 500;
        }

        .dashed-line {
            border-bottom: 1px dashed var(--border-color);
            margin: 12px 0;
        }

        .full-line {
            border-bottom: 2px solid var(--brand-primary);
            margin: 12px 0;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-tertiary);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .table-body {
            margin-top: 8px;
        }

        .table-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            line-height: 2;
            padding: 4px 0;
            color: var(--text-primary);
        }

        .table-row .name {
            flex: 2;
            text-align: left;
        }

        .table-row .price {
            flex: 1;
            text-align: right;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .table-row .quantity {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .table-row .subtotal {
            flex: 1;
            text-align: right;
            font-weight: 600;
            color: var(--text-primary);
        }

        .note-section {
            margin-bottom: 8px;
            padding-top: 8px;
        }

        .note-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .note-content {
            flex: 1;
            word-break: break-all;
            color: var(--text-primary);
        }

        .total-section {
            margin-top: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            padding: 6px 0;
            align-items: center;
        }

        .total-row .label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .total-row .amount {
            font-size: 22px;
            font-weight: 700;
            color: var(--brand-primary);
        }

        .receipt-footer {
            background-color: var(--bg-tertiary);
            padding: 16px 20px;
            text-align: center;
            border-top: 1px solid var(--border-light);
        }

        .receipt-footer p {
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.7;
        }

        .footer-thanks {
            font-size: 13px !important;
            color: var(--text-secondary) !important;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .print-btn {
            flex: 1;
            padding: 12px 24px;
            background-color: var(--brand-primary);
            color: #1A1A1E;
            border: none;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .back-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 24px;
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            text-decoration: none;
            line-height: 1;
        }

        .back-btn:hover {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--brand-primary);
            transform: translateY(-1px);
        }

        .btn-container {
            width: 400px;
            max-width: 100%;
            margin: 20px auto 0;
            display: flex;
            gap: 10px;
        }

        .print-btn:hover {
            background-color: var(--brand-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 138, 61, 0.35);
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 12px;
            }

            .receipt-body {
                padding: 16px;
            }

            .receipt-header {
                padding: 20px;
            }

            .receipt-header h1 {
                font-size: 20px;
            }

            .total-row .amount {
                font-size: 20px;
            }

            .btn-container {
                flex-direction: column;
                gap: 8px;
            }

            .print-btn, .back-btn {
                width: 100%;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .receipt-container {
                box-shadow: none;
                max-width: 100%;
                width: 100%;
                border: none;
                background-color: white;
            }

            .receipt-header {
                background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
                color: white;
            }

            .receipt-body {
                background: white;
            }

            .info-row {
                color: #333;
            }

            .info-row .label {
                color: #666;
            }

            .dashed-line {
                border-bottom-color: #ddd;
            }

            .full-line {
                border-bottom-color: #333;
            }

            .table-header {
                color: #666;
                border-bottom-color: #eee;
            }

            .table-row {
                color: #333;
            }

            .table-row .price,
            .table-row .quantity {
                color: #666;
            }

            .note-row {
                color: #666;
            }

            .note-content {
                color: #333;
            }

            .total-row .label {
                color: #666;
            }

            .total-row .amount {
                color: #ff6b6b;
            }

            .receipt-footer {
                background-color: #f8f8f8;
                border-top-color: #eee;
            }

            .receipt-footer p {
                color: #999;
            }

            .footer-thanks {
                color: #666 !important;
            }
            
            .print-btn, .back-btn,
            .btn-container {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="receipt-container" id="receipt-container">
        <div class="receipt-header">
            <h1>小贾私房菜</h1>
            <p>爱仙仙的每一天</p>
        </div>
        
        <div class="receipt-body">
            <div class="receipt-info">
                <div class="info-row">
                    <span class="label">点餐时间:</span>
                    <span class="value" id="order-date">-</span>
                </div>
                <div class="info-row">
                    <span class="label">单号:</span>
                    <span class="value" id="order-no">-</span>
                </div>
                <div class="info-row">
                    <span class="label">服务员:</span>
                    <span class="value" id="waiter">-</span>
                </div>
            </div>

            <div class="dashed-line"></div>

            <div class="table-header">
                <span class="name">菜品</span>
                <span class="quantity">数量</span>
                <span class="price">单价</span>
                <span class="subtotal">小计</span>
            </div>

            <div class="table-body" id="order-items">
            </div>

            <div class="full-line"></div>

            <div class="note-section" id="note-section" style="display: none;">
                <div class="note-row">
                    <span class="label">备注:</span>
                    <span class="note-content" id="note-content"></span>
                </div>
            </div>

            <div class="total-section">
                <div class="total-row">
                    <span class="label">合计金额:</span>
                    <span class="amount" id="total-amount">¥0.00</span>
                </div>
            </div>
        </div>

        <div class="receipt-footer">
            <p class="footer-thanks">喂饱仙仙宝贝，期待下次再来哦</p>
            <p>小贾私房菜 | 用心烹饪每一道菜</p>
<!--        <p>客服热线: 饿了只需要叫声爸爸，我就来了</p>-->        
        </div>
    </div>

    <div class="btn-container">
        <button class="print-btn" onclick="window.print()">打印小票</button>
        <a href="index.html" class="back-btn">返回首页</a>
    </div>

    <script>
        function generateOrderNo() {
            const timestamp = Date.now().toString();
            const random = Math.random().toString(36).substr(2, 8).toUpperCase();
            return `OD-${timestamp}${random}`;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        async function fetchReceiptInfo() {
            try {
                const response = await fetch('/api/receipt/info');
                const data = await response.json();
                return data;
            } catch (e) {
                console.error('获取小票信息失败:', e);
                return {
                    order_number: generateOrderNo(),
                    order_date: formatDate(new Date())
                };
            }
        }

        async function renderReceipt(orderData) {
            const orderItems = document.getElementById('order-items');
            orderItems.innerHTML = '';

            if (!orderData || !orderData['订单详情']) {
                orderItems.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">暂无订单数据</p>';
                return;
            }

            const receiptInfo = await fetchReceiptInfo();
            document.getElementById('order-date').textContent = receiptInfo.order_date;
            document.getElementById('order-no').textContent = receiptInfo.order_number;
            document.getElementById('waiter').textContent = '仙仙的饲养员';
            document.getElementById('total-amount').textContent = `¥${orderData['合计金额']}`;

            const noteSection = document.getElementById('note-section');
            const noteContent = document.getElementById('note-content');
            const note = orderData['备注'] || '';
            if (note) {
                noteContent.textContent = note;
                noteSection.style.display = 'block';
            } else {
                noteSection.style.display = 'none';
            }

            orderData['订单详情'].forEach(item => {
                const row = document.createElement('div');
                row.className = 'table-row';
                const name = item['名称'] || item['菜品名称'] || '';
                const quantity = item['数量'] || item['菜品数量'] || 0;
                const price = item['单价'] || item['菜品单价'] || 0;
                const subtotal = item['小计金额'] || 0;
                row.innerHTML = `
                    <span class="name">${name}</span>
                    <span class="quantity">${quantity}</span>
                    <span class="price">¥${price}</span>
                    <span class="subtotal">¥${subtotal}</span>
                `;
                orderItems.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderJson = urlParams.get('order');

            if (orderJson) {
                try {
                    const orderData = JSON.parse(decodeURIComponent(orderJson));
                    renderReceipt(orderData);
                } catch (e) {
                    console.error('解析订单数据失败:', e);
                    renderReceipt(null);
                }
            } else {
                renderReceipt(null);
            }
        });

        window.renderReceipt = renderReceipt;
    </script>
</body>
</html>
